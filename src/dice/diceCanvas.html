<!doctype html>
<html lang="en">
  <head>
  </head>
  <body>
    <div id="dice-canvas-container"></div>

    <style>
        html, body {
        margin: 0;
        padding: 0;
        width: auto;
        height: auto;
        overflow: hidden;
        pointer-events: none !important;
      }
    </style>

    <script type="module">
      import { simulateDiceRoll } from '/src/dice/diceController.js';

      import OBR from "@owlbear-rodeo/sdk";

      async function initSystem(){
        const urlParams = new URLSearchParams(window.location.search);
        const diceCount = parseInt(urlParams.get('diceCount')) || 0;
        const diceColor = urlParams.get('diceColor');

        const results = await simulateDiceRoll(diceCount, diceColor);

        console.log("Roll results:", results);
        OBR.notification.show(`Rolled ${results.count}D6: (${results.faces.join(", ")}) Success: ${results.success.reduce((a, b) => a + b, 0)} [${results.diceColor.toUpperCase()}]`);
      }

      await initSystem();
    </script>
  </body>
</html>
